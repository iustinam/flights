apiVersion: v1
kind: ServiceAccount
metadata:
  name: flights
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: flights-executor
  namespace: {{ .Release.Namespace }}
rules:
  - apiGroups: [argoproj.io]
    resources: [workflowtaskresults]
    verbs: [create, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: flights-executor
  namespace: {{ .Release.Namespace }}
subjects:
  - kind: ServiceAccount
    name: flights
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: flights-executor
  apiGroup: rbac.authorization.k8s.io
---
# what the Argo Controller SA needs in this namespace beyond its ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argo-controller-flights
  namespace: {{ .Release.Namespace }}
rules:
  - apiGroups: [""]
    resources: [pods, pods/exec]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [""]
    resources: [pods/log]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [persistentvolumeclaims]
    verbs: [get, list, watch, create, delete]
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argo-controller-flights
  namespace: {{ .Release.Namespace }}
subjects:
  - kind: ServiceAccount
    name: argo-workflows-controller
    namespace: argo
roleRef:
  kind: Role
  name: flights
  apiGroup: rbac.authorization.k8s.io
