name: Generate flight report

on:
  workflow_dispatch:
    inputs:
      config_json:
        description: "Configuration in JSON format"
        required: true

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install -e .

      - name: Generate report
        run: |
          flights report --config-json '${{ inputs.config_json }}'

      - name: Publish to GitHub Pages
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add reports/
          git commit -m "Add flight report $(date -u +%F_%H-%M)" || exit 0
          git push
